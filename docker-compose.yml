services:
  enphase-mcp:
    image: ghcr.io/aldarondo/enphase-mcp:latest   # built by .github/workflows/build.yml
    container_name: enphase-mcp
    restart: unless-stopped
    working_dir: /app
    environment:
      MCP_TRANSPORT: sse
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8766"
      ENPHASE_EMAIL: ${ENPHASE_EMAIL}
      ENPHASE_PASSWORD: ${ENPHASE_PASSWORD}
    volumes:
      - /volume1/docker/claude-enphase/logs:/app/logs
    ports:
      - "8766:8766"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8766/sse')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
